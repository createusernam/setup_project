name: verify setup

on:
  push:
  pull_request:

jobs:
  full-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip PyYAML
      - run: python3 scripts/verify-setup.py --profile full
